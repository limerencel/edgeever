name: Update deployed EdgeEver

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: Update channel for this run
        required: true
        default: stable
        type: choice
        options:
          - stable
          - edge

permissions:
  contents: write
  issues: write

concurrency:
  group: edgeever-upstream-update
  cancel-in-progress: false

jobs:
  update:
    if: github.repository != 'tianma-if/edgeever'
    name: Sync, verify, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPSTREAM_REPOSITORY: tianma-if/edgeever
      UPDATE_CHANNEL: ${{ inputs.channel || vars.EDGE_EVER_UPDATE_CHANNEL || 'stable' }}

    steps:
      - name: Checkout deployed repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Require a GitHub Fork
        shell: bash
        run: |
          set -euo pipefail
          is_fork="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.fork')"
          if [ "${is_fork}" != "true" ]; then
            echo "This deployment repository must be a GitHub Fork of ${UPSTREAM_REPOSITORY}." >&2
            echo "Create the repository with the EdgeEver Fork flow before enabling upstream updates." >&2
            exit 1
          fi

      - name: Resolve upstream version
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch upstream main --tags

          case "${UPDATE_CHANNEL}" in
            stable)
              target_ref="$(gh api "repos/${UPSTREAM_REPOSITORY}/releases/latest" --jq '.tag_name')"
              ;;
            edge)
              target_ref="upstream/main"
              ;;
            *)
              echo "Unsupported update channel: ${UPDATE_CHANNEL}" >&2
              exit 1
              ;;
          esac

          target_commit="$(git rev-parse "${target_ref}^{commit}")"
          if git merge-base --is-ancestor "${target_commit}" HEAD; then
            update_required=false
            bootstrap_required=false
          else
            update_required=true
            bootstrap_required=false

            # Cloudflare Deploy buttons create a fresh repository with a
            # synthetic `source repo import` commit instead of preserving the
            # upstream Git history. The first update must connect that import
            # history to upstream before normal merges can work. Only do this
            # automatically when the downstream repository contains no changes
            # beyond the updater workflow itself; otherwise fail closed and ask
            # the owner to resolve the customized repository manually.
            root_commit="$(git rev-list --max-parents=0 HEAD)"
            root_subject="$(git show -s --format=%s "${root_commit}")"
            non_workflow_changes="$(git diff --name-only "${root_commit}" HEAD -- ':!.github/workflows/sync-edgeever-upstream.yml')"
            if [ "${root_subject}" = "source repo import" ] && [ -z "${non_workflow_changes}" ]; then
              bootstrap_required=true
            fi
          fi

          {
            echo "target_ref=${target_ref}"
            echo "target_commit=${target_commit}"
            echo "update_required=${update_required}"
            echo "bootstrap_required=${bootstrap_required}"
          } >> "${GITHUB_OUTPUT}"

      - name: Merge upstream update
        if: steps.upstream.outputs.update_required == 'true'
        env:
          TARGET_COMMIT: ${{ steps.upstream.outputs.target_commit }}
          TARGET_REF: ${{ steps.upstream.outputs.target_ref }}
          BOOTSTRAP_REQUIRED: ${{ steps.upstream.outputs.bootstrap_required }}
        run: |
          git config user.name "edgeever-updater[bot]"
          git config user.email "edgeever-updater[bot]@users.noreply.github.com"
          if [ "${BOOTSTRAP_REQUIRED}" = "true" ]; then
            git merge --allow-unrelated-histories --no-edit -X theirs \
              -m "chore: initialize EdgeEver history from ${TARGET_REF}" "${TARGET_COMMIT}"
          else
            git merge --no-edit -m "chore: update EdgeEver from ${TARGET_REF}" "${TARGET_COMMIT}"
          fi

      - name: Set up Bun
        if: steps.upstream.outputs.update_required == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify update
        if: steps.upstream.outputs.update_required == 'true'
        run: |
          bun install --frozen-lockfile
          bun run db:migrate:local
          bun test
          bun run typecheck
          bun run build

      - name: Publish update
        if: steps.upstream.outputs.update_required == 'true'
        run: git push origin HEAD:main

      - name: Report an update failure
        if: failure()
        continue-on-error: true
        env:
          TARGET_REF: ${{ steps.upstream.outputs.target_ref || 'unknown' }}
        run: |
          title="EdgeEver automatic update requires attention"
          existing="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number // empty')"
          if [ -z "${existing}" ]; then
            gh issue create \
              --title "${title}" \
              --body "The daily update from \`${UPSTREAM_REPOSITORY}\` (${TARGET_REF}) could not be merged or verified. The current production deployment was left unchanged. Open the failed **Update deployed EdgeEver** workflow run for details, then retry it manually after resolving the problem."
          fi
